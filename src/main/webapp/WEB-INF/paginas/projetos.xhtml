<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:rich="http://richfaces.org/rich"
      xmlns:f="http://java.sun.com/jsf/core">
<h:head>
    <title>Gerenciamento de Projetos</title>
    <h:outputStylesheet library="css" name="estilos.css" />
</h:head>

<h:body>
    <h1>Cadastro de Projetos</h1>

    <h:form>
        <h:messages globalOnly="true" />
        <rich:panel>
            <div>
            <h:outputLabel for="titulo" value="Título:" />
                <br />
                <h:inputText id="titulo" value="#{projetoController.projetoSelecionado.titulo}" required="true" label="Título" validatorMessage="Insira o Titulo do Projeto.">
                    <f:validateLength minimum="5" />
                </h:inputText>
            </div>
            <br />

            <div>
            <h:outputLabel for="descricao" value="Descrição:" />
                <br />
            <h:inputText id="descricao" value="#{projetoController.projetoSelecionado.descricao}" label="Descrição" />
            </div>
            <br />

            <div>
            <h:outputLabel for="dataInicio" value="Data de Início:" />
                <br />
            <h:inputText id="dataInicio" value="#{projetoController.projetoSelecionado.dataInicio}" required="true" label="Data de Início" validatorMessage="Insira a Data de Inicio do Projeto.">
                <f:convertDateTime pattern="dd/MM/yyyy" />
            </h:inputText>
            </div>
            <br />

            <div>
            <h:commandButton value="Adicionar Projeto" action="#{projetoController.adicionarProjeto()}" />
            </div>
        </rich:panel>
    </h:form>


    <br />

    <h:form>
        <h:outputText value="Lista de Projetos" />
        <br />

        <rich:dataTable value="#{projetoController.projetos}" var="projeto" id="projetos">
            <rich:column>
                <f:facet name="header">Título</f:facet>
                #{projeto.titulo}
            </rich:column>

            <rich:column>
                <f:facet name="header">Descrição</f:facet>
                #{projeto.descricao}
            </rich:column>

            <rich:column>
                <f:facet name="header">Data de Início</f:facet>
                #{projeto.dataInicio}
            </rich:column>

            <rich:column>
                <f:facet name="header">Ações</f:facet>
                <h:commandButton value="Visualizar" action="#{projetoController.listarProjetos()}" />
                <span />
                <h:commandButton value="Editar" action="#{projetoController.editarProjeto(projeto)}" />
                <span />
                <h:commandButton value="Excluir" action="#{projetoController.excluirProjeto(projeto.id)}" />
            </rich:column>
        </rich:dataTable>
    </h:form>

    <h:form>
    <rich:panel>
        <rich:menuItem label="Voltar ao Início" action="#{navigationBean.inicio()}" />
    </rich:panel>
    </h:form>

</h:body>
</html>
