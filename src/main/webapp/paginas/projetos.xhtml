<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:rich="http://richfaces.org/rich"
      xmlns:f="http://java.sun.com/jsf/core">
<h:head>
    <title>Gerenciamento de Projetos</title>
</h:head>

<h:body>
    <h1>Cadastro de Projetos</h1>

    <rich:form>
        <rich:panel>
            <h:outputLabel for="titulo" value="Título:" />
            <h:inputText id="titulo" value="#{projetoBean.projeto.titulo}" required="true" label="Título" />

            <h:outputLabel for="descricao" value="Descrição:" />
            <rich:inputTextarea id="descricao" value="#{projetoBean.projeto.descricao}" required="true" label="Descrição" rows="5" cols="30" />

            <h:outputLabel for="dataInicio" value="Data de Início:" />
            <h:inputText id="dataInicio" value="#{projetoBean.projeto.dataInicio}" required="true" label="Data de Início">
                <f:convertDateTime pattern="dd/MM/yyyy" />
            </h:inputText>

            <h:commandButton value="Adicionar Projeto" action="#{projetoBean.adicionarProjeto}" />
        </rich:panel>
    </rich:form>


    <h:br />

    <rich:form>
        <h:outputText value="Lista de Projetos" />

        <rich:dataTable value="#{projetoController.projetos}" var="projeto" id="projetos">
            <rich:column>
                <f:facet name="header">Título</f:facet>
                #{projeto.titulo}
            </rich:column>

            <rich:column>
                <f:facet name="header">Descrição</f:facet>
                #{projeto.descricao}
            </rich:column>

            <rich:column>
                <f:facet name="header">Data de Início</f:facet>
                #{projeto.dataInicio}
            </rich:column>

            <rich:column>
                <f:facet name="header">Ações</f:facet>
                <h:commandButton value="Visualizar" action="#{projetoController.visualizarProjeto(projeto)}" />
                <h:commandButton value="Editar" action="#{projetoController.editarProjeto(projeto)}" />
                <h:commandButton value="Excluir" action="#{projetoController.excluirProjeto(projeto)}" />
            </rich:column>
        </rich:dataTable>
    </rich:form>

    <rich:menu>
        <rich:menuItem value="Voltar para Início" action="index.xhtml" />
    </rich:menu>
</h:body>
</html>
